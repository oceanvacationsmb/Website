<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Vacations</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

header {
  padding:20px;
  text-align:center;
  background:#fff;
  border-bottom:1px solid #ddd;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap:15px;
  padding:20px;
}

/* SMALL CARD */
.card {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  transition:.2s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
}

.card .info {
  padding:10px;
  font-size:14px;
  font-weight:bold;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content {
  background:#fff;
  padding:15px;
  border-radius:10px;
  max-width:500px;
  width:95%;
}

.close {
  float:right;
  cursor:pointer;
  font-size:18px;
}

/* EMBED SIZE */
.airbnb-embed-frame {
  width:100% !important;
  height:320px !important;
}
</style>
</head>

<body>

<header>
  <h2>Ocean Vacations Properties</h2>
</header>

<div class="grid">

  <!-- CARD 1 -->
  <div class="card" onclick="openModal('1013851374933265441')">
    <img src="https://via.placeholder.com/300x200">
    <div class="info">8BR Myrtle Beach • ★4.81</div>
  </div>

  <!-- CARD 2 -->
  <div class="card" onclick="openModal('1159597823002124183')">
    <img src="https://via.placeholder.com/300x200">
    <div class="info">8BR Myrtle Beach • ★4.67</div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="embedContainer"></div>
  </div>
</div>

<script>
function openModal(id) {
  document.getElementById("modal").style.display = "flex";

  document.getElementById("embedContainer").innerHTML = `
    <div class="airbnb-embed-frame"
         data-id="${id}"
         data-view="home"
         data-hide-price="true">
      <a href="https://www.airbnb.com/rooms/${id}?guests=1&adults=1&s=66&source=embed_widget">View</a>
    </div>
  `;

  // reload Airbnb script
  let script = document.createElement("script");
  script.src = "https://www.airbnb.com/embeddable/airbnb_jssdk";
  script.async = true;
  document.body.appendChild(script);
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
  document.getElementById("embedContainer").innerHTML = "";
}
</script>

</body>
</html>
